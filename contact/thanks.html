<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Message Sent — Victory Nonye Ibeagi</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    .thanks-page {
      min-height: 100vh;
      background: var(--navy2);
      display: flex;
      align-items: center;
      justify-content: center;
      padding-top: 68px;
    }
    .thanks-box {
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 20px;
      padding: 60px 48px;
      text-align: center;
      max-width: 520px;
      width: 100%;
    }
    .thanks-icon {
      width: 80px; height: 80px;
      border-radius: 50%;
      background: rgba(16,185,129,.15);
      border: 2px solid #10B981;
      display: flex; align-items: center; justify-content: center;
      font-size: 36px;
      color: #10B981;
      margin: 0 auto 28px;
    }
    .thanks-box h1 {
      font-family: 'Syne', sans-serif;
      font-size: 32px;
      font-weight: 800;
      color: #fff;
      margin-bottom: 14px;
    }
    .thanks-box p {
      font-size: 15px;
      color: rgba(255,255,255,.65);
      line-height: 1.75;
      margin-bottom: 32px;
    }
    .thanks-box p span { color: var(--gold); font-weight: 600; }
    .thanks-btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="nav">
  <div class="nav__inner">
    <a href="index.html" class="nav__logo">V<span>.</span>NI</a>
    <ul class="nav__links">

      <li><a href="skills.html">Skills</a></li>
      <li><a href="projects.html">Projects</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
    <a href="contact.html" class="nav__hire">Hire Me</a>
  </div>
</nav>

<section class="thanks-page">
  <div class="thanks-box">
    <div class="thanks-icon">
      <i class="fa-solid fa-check"></i>
    </div>
    <h1>Message Sent!</h1>
    <p>
      Thank you for reaching out! I have received your message and will get back to you at
      <span>nonyeibeagi@gmail.com</span> within 24 hours.
    </p>
    <div class="thanks-btns">
      <a href="index.html" class="btn btn--gold">
        <i class="fa-solid fa-house"></i> Back to Home
      </a>
      <a href="projects.html" class="btn btn--ghost">
        <i class="fa-solid fa-laptop-code"></i> View My Projects
      </a>
    </div>
  </div>
</section>
